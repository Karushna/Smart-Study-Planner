<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Study Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Smart Study Planner 📚</h1>
            <p>Plan smart, study better.</p>
        </header>

        <main class="dashboard">
            <!-- Form Section -->
            <section class="task-form-section card">
                <h2>Add New Task</h2>
                <form id="task-form">
                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <input type="text" id="subject" required placeholder="e.g., Mathematics, History">
                    </div>
                    
                    <div class="form-group">
                        <label for="deadline">Deadline</label>
                        <input type="datetime-local" id="deadline" required>
                    </div>

                    <div class="form-group">
                        <label for="priority">Priority</label>
                        <select id="priority">
                            <option value="high">High</option>
                            <option value="medium" selected>Medium</option>
                            <option value="low">Low</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="est-time">Est. Study Time (Hours)</label>
                        <input type="number" id="est-time" min="0.5" step="0.5" required placeholder="e.g., 2">
                    </div>

                    <button type="submit" class="btn-primary">Add Task</button>
                </form>
            </section>

            <!-- Task List Section -->
            <section class="task-list-section card">
                <h2>Current Tasks</h2>
                <ul id="task-list" class="task-list">
                    <!-- JavaScript will inject tasks here -->
                </ul>
            </section>

            <!-- Schedule View Section -->
            <section class="schedule-section card">
                <h2>Study Schedule</h2>
                <div id="schedule-view" class="schedule-view">
                    <!-- JavaScript will inject the schedule here -->
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
<!-- app.js -->
